[workspace]
resolver = "2"
members = [
    "crates/miniter-domain",
    "crates/miniter-usecases",
    "crates/miniter-render-plan",
    "crates/miniter-audio",
    "crates/miniter-media-native",
    "crates/miniter-ffi",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "GPL-3.0"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde", "js"] }
thiserror = "2"
log = "0.4"
uniffi = { version = "0.31", features = ["wasm-unstable-single-threaded"] }

[patch.crates-io] # Probably push all online later to remove direct path listings?
muxide = { path = "/home/ymsr/Documents/Repos/muxide" }
ass-renderer = { path = "/home/ymsr/Documents/Repos/ass-rs/crates/ass-renderer" }
ass-core = { path = "/home/ymsr/Documents/Repos/ass-rs/crates/ass-core" }
cros-libva = { path = "/home/ymsr/Documents/Repos/cros-libva/lib" }
cros-codecs = { path = "/home/ymsr/Documents/Repos/cros-codecs" }
