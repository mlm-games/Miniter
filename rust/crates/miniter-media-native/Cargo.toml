[package]
name = "miniter-media-native"
version.workspace = true
edition.workspace = true

[dependencies] # Pure rust or class platform options only!
miniter-domain = { path = "../miniter-domain" }
miniter-render-plan = { path = "../miniter-render-plan" }
miniter-audio = { path = "../miniter-audio" }
thiserror.workspace = true
log.workspace = true

# Container demux/mux
mp4 = "0.14"
muxide = "0.2"

# H.264 codec (compiles from source with CXX vars so, is cross-platform)
openh264 = { version = "0.9", features = ["source"] }
less-avc = "0.1.5"

# AV1
rav1e = { version = "0.8", default-features = false }
ivf = "0.1"
av-ivf = "0.5"

# Audio demuxing
symphonia = { version = "0.5.5", features = ["isomp4", "mkv", "pcm"] }

# Opus encoding)
mousiki = "0.2.1"

# Text rendering for export
font8x8 = { version = "0.3", default-features = false, features = ["unicode"] }

# ASS subtitle rendering
ass-renderer = { path = "/home/ymsr/Documents/Repos/ass-rs/crates/ass-renderer", default-features = false, features = ["software-backend", "image", "simd"] }
ass-core = { path = "/home/ymsr/Documents/Repos/ass-rs/crates/ass-core" }
