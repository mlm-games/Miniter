[package]
name = "miniter-media-native"
version.workspace = true
edition.workspace = true

[dependencies] # Pure rust or class platform options only!
miniter-domain = { path = "../miniter-domain" }
miniter-render-plan = { path = "../miniter-render-plan" }
miniter-audio = { path = "../miniter-audio" }
thiserror.workspace = true
log.workspace = true

# Container demux/mux
mp4 = "0.14"
muxide = "0.2"

# H.264 encoder
less-avc = "0.1.5"

# Pure Rust H.264 decoder (fallback)
videoson-core = { path = "/home/ymsr/Documents/Repos/videoson/videoson-core", optional = true }
videoson-codec-h264 = { path = "/home/ymsr/Documents/Repos/videoson/videoson-codec-h264", optional = true }

# AV1
rav1e = { version = "0.8", default-features = false }
ivf = "0.1"
av-ivf = "0.5"

# Audio demuxing
symphonia = { version = "0.5.5", features = ["isomp4", "mkv", "pcm"] }

# Opus encoding
mousiki = "0.2.1"

# Text rendering for export
font8x8 = { version = "0.3", default-features = false, features = ["unicode"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ass-renderer = { path = "/home/ymsr/Documents/Repos/ass-rs/crates/ass-renderer", default-features = false, features = [
    "software-backend",
    "image",
    "simd",
] }
ass-core = { path = "/home/ymsr/Documents/Repos/ass-rs/crates/ass-core" }

[target.'cfg(target_os = "linux")'.dependencies]
baabaabaabaabababbababbaa = { path = "/home/ymsr/Documents/Repos/baabaabaabaabababbababbaa", optional = true, default-features = false, features = [
    "linux",
] }
tokio = { version = "1", features = ["rt-multi-thread"] }

[target.'cfg(target_os = "android")'.dependencies]
baabaabaabaabababbababbaa = { path = "/home/ymsr/Documents/Repos/baabaabaabaabababbababbaa", optional = true, default-features = false, features = [
    "android",
] }
tokio = { version = "1", features = ["rt-multi-thread"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
baabaabaabaabababbababbaa = { path = "/home/ymsr/Documents/Repos/baabaabaabaabababbababbaa", optional = true, default-features = false, features = [
    "web-codecs",
] }
web-sys = { version = "0.3.91", features = ["Window", "Document", "Storage"] }
getrandom = { version = "0.3", features = ["wasm_js"] }
wasm-bindgen-futures = "0.4"

[features]
default = ["videoson"]
videoson = ["dep:videoson-core", "dep:videoson-codec-h264"]
experimental-baaba = ["dep:baabaabaabaabababbababbaa"]
