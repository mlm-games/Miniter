[package]
name = "miniter-media-native"
version.workspace = true
edition.workspace = true

[dependencies] # Pure rust or cross platform options only!
miniter-domain = { path = "../miniter-domain" }
miniter-render-plan = { path = "../miniter-render-plan" }
miniter-audio = { path = "../miniter-audio" }
thiserror.workspace = true
log.workspace = true
web-time.workspace = true

# Container demux/mux (switch to videoson later)
mp4 = "0.14"
muxide = "0.2"

# H.264 encoder & decoders (fallback)
less-avc = "0.1.5"
videoson-core = { git = "https://github.com/mlm-games/videoson", optional = true, default-features = false, package = "videoson-core" }
videoson-codec-h264 = { git = "https://github.com/mlm-games/videoson", optional = true, default-features = false, package = "videoson-codec-h264" }

# AV1
rav1e = { version = "0.8", default-features = false }
ivf = "0.1"
av-ivf = "0.5"

# Audio demuxing
symphonia = { version = "0.5.5", features = ["isomp4", "mkv", "pcm"] }

# Opus encoding
mousiki = "0.2.1"

# Text rendering for export
font8x8 = { version = "0.3", default-features = false, features = ["unicode"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ass-renderer = { git = "https://github.com/mlm-games/ass-rs", default-features = false, features = [
    "software-backend",
    "image",
    "simd",
] }
ass-core = { git = "https://github.com/mlm-games/ass-rs", package = "ass-core" }
tokio = { version = "1", features = ["rt-multi-thread"] }

[target.'cfg(all(target_os = "android", target_arch = "aarch64"))'.dependencies]
baabaabaabaabababbababbaa = { git = "https://github.com/mlm-games/baa4bababab2baa", optional = true, default-features = false, features = [
    "android",
] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
baabaabaabaabababbababbaa = { git = "https://github.com/mlm-games/baa4bababab2baa", optional = true, default-features = false, features = [
    "web-codecs",
] }
web-sys = { version = "0.3.91", features = ["Window", "Document", "Storage"] }
getrandom = { version = "0.3", features = ["wasm_js"] }
wasm-bindgen-futures = "0.4"

[features]
default = ["videoson", "hw-decoder"]
hw-decoder = ["dep:baabaabaabaabababbababbaa"]
videoson = ["dep:videoson-core", "dep:videoson-codec-h264"]
