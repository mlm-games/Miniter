[package]
name = "miniter-media-native"
version.workspace = true
edition.workspace = true

[dependencies]
miniter-domain = { path = "../miniter-domain" }
miniter-render-plan = { path = "../miniter-render-plan" }
thiserror.workspace = true
log.workspace = true

# Container demux/mux (pure Rust)
mp4 = "0.14"

# H.264 codec (compiles from source via C++ — cross-platform)
openh264 = { version = "0.6", features = ["source"] }

# Audio demuxing (pure Rust)
symphonia = { version = "0.5.5", features = ["isomp4", "mkv"] }

# Text rendering for export
font8x8 = { version = "0.3", default-features = false, features = ["unicode"] }

# [target.'cfg(target_os = "linux")'.dependencies]
# # VP9 codec (requires system libvpx)
# vpx-encode = { version = "0.6", features = ["vp9"] }
# # WebM container muxer (wraps libwebm)
# webm = "2"