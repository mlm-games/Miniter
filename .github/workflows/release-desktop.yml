name: Desktop Releases

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., 0.1.0)'
        required: true
        type: string
      mark_prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: write

concurrency:
  group: desktop-release-${{ inputs.version_tag }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      APP_VERSION: ${{ inputs.version_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Package desktop application
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS --no-daemon

      - name: Collect desktop artifacts
        run: |
          mkdir -p dist
          find desktopApp/build/compose/binaries/main -type f \( -name "*.deb" -o -name "*.rpm" \) -exec cp {} dist/ \;
          ls -la dist

      - name: Upload artifacts (CI)
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop
          path: dist/*

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-desktop
          path: dist

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          name: ${{ inputs.version_tag }}
          prerelease: ${{ inputs.mark_prerelease }}
          files: dist/*
